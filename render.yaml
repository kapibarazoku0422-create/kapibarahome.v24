services:
  - type: web
    name: kapibara-proxy
    runtime: node
    plan: free
    buildCommand: python -m pip install --no-cache-dir yt-dlp && npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: kapibara-db
          property: connectionString
      - key: PROXY_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLASSROOM_CLASS_ID
        sync: false

databases:
  - name: kapibara-db
    plan: free
    databaseName: kapibara
    user: kapibara
