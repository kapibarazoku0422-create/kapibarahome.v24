<!DOCTYPE html>
<html style="margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Minecraft 1.8 — カピバラproxy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
#bar{position:fixed;top:0;left:0;right:0;height:34px;background:#0d1a0d;
     display:flex;align-items:center;padding:0 10px;gap:12px;z-index:10;
     border-bottom:1px solid #2a4a2a;font-family:system-ui,sans-serif}
#bar a{color:#7ec850;font-size:13px;text-decoration:none;font-weight:600}
#bar a:hover{color:#a8d87a}
#bar .title{color:#5d9a40;font-size:13px}
#frame{position:fixed;top:34px;left:0;width:100%;height:calc(100% - 34px);border:none;display:none}
#overlay{position:fixed;top:34px;left:0;width:100%;height:calc(100% - 34px);
         display:flex;flex-direction:column;align-items:center;justify-content:center;
         background:#0a120a;color:#7ec850;font-family:system-ui,sans-serif;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #1e3a1e;border-top-color:#7ec850;
         border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#overlay p{font-size:14px;color:#5d9a40}
</style>
</head>
<body>
<div id="bar">
  <a href="/">← ホーム</a>
  <span class="title">⛏ Minecraft 1.8 (Eaglercraft)</span>
</div>
<div id="overlay">
  <div class="spinner"></div>
  <p>ゲームを読み込んでいます...</p>
</div>
<iframe id="frame"
  allowfullscreen
  allow="fullscreen *; pointer-lock *; clipboard-read *; clipboard-write *"
></iframe>
<script>
(function() {
  fetch('/__seal?u=' + encodeURIComponent('https://eaglercraft.com/mc/1.8.8/'))
    .then(function(r) { return r.text(); })
    .then(function(token) {
      var f = document.getElementById('frame');
      f.src = '/p/' + token;
      f.style.display = '';
      document.getElementById('overlay').style.display = 'none';
    })
    .catch(function() {
      var ov = document.getElementById('overlay');
      ov.innerHTML = '<p style="color:#f87171">読み込みに失敗しました。</p><a href="https://eaglercraft.com/mc/1.8.8/" style="color:#7ec850;font-size:13px" target="_blank">eaglercraft.com で開く ↗</a>';
    });
})();
</script>
</body>
</html>
